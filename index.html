<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xurel - Link Shopee</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        
        @keyframes gradientBackground {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body {
            min-height: 100vh;
            background: linear-gradient(120deg, #ff9a9e, #fad0c4, #fbc2eb, #a18cd1, #84fab0, #8fd3f4);
            background-size: 300% 300%;
            animation: gradientBackground 15s ease infinite;
            display: flex; flex-direction: column; align-items: center;
            padding-bottom: 20px;
        }

        /* --- TOOLBAR --- */
        .toolbar {
            width: 100%; background: rgba(255, 255, 255, 0.95);
            padding: 8px 15px; display: flex; justify-content: space-between;
            align-items: center; box-shadow: 0 2px 15px rgba(0,0,0,0.1);
            position: sticky; top: 0; z-index: 1000;
        }
        .nav-links { display: flex; align-items: center; gap: 5px; }
        .nav-item {
            text-decoration: none; color: #555; 
            display: flex; align-items: center; justify-content: center;
            width: 40px; height: 40px; border-radius: 12px; transition: 0.3s;
        }
        .nav-item:hover, .nav-item.active { color: #ff6b6b; background: rgba(255, 107, 107, 0.1); }
        .nav-divider { width: 1.5px; height: 22px; background: #e0e0e0; margin: 0 4px; }

        /* --- AUTH --- */
        .auth-container { position: relative; }
        .login-popup {
            display: none; position: absolute; top: 50px; right: 0;
            background: white; padding: 15px; border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 240px; 
            flex-direction: column; gap: 10px; z-index: 1001;
        }
        .login-popup input { padding: 10px; border: 1px solid #ddd; border-radius: 8px; outline: none; }
        .btn-login-submit { background: #2ecc71; color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; }

        /* --- ADMIN PANEL --- */
        #admin-panel {
            background: white; padding: 20px; border-radius: 20px; margin: 20px 0;
            width: 90%; max-width: 500px; display: none; box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .admin-input, .admin-select { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #eee; border-radius: 8px; background: #f9f9f9; outline: none;}
        .btn-add { background: #2ecc71; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px; }

        /* --- PERBAIKAN GENERATE AREA (RESPONSIF) --- */
        .generate-container {
            width: 90%; /* Memberikan jarak dari tepi layar */
            max-width: 550px; /* Tidak terlalu lebar di layar besar */
            background: rgba(255, 255, 255, 0.98);
            border-radius: 50px; 
            padding: 6px; /* Mengecilkan padding luar */
            margin: 25px auto 10px auto; /* Margin auto agar rata tengah */
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(255,255,255,0.5);
        }
        .generate-box { display: flex; align-items: center; width: 100%; }
        .generate-box input {
            flex: 1; 
            padding: 12px 20px; 
            border: none;
            border-radius: 40px 0 0 40px;
            font-size: 1em; 
            font-weight: 600; 
            color: #444; 
            outline: none; 
            background: #f8f9fa; /* Lebih cerah sedikit */
            min-width: 0; /* Penting agar tidak meluap di flexbox */
        }
        .generate-box button {
            background: #4a90e2; 
            color: white; 
            border: none; 
            padding: 12px 20px; 
            border-radius: 0 40px 40px 0;
            cursor: pointer; 
            font-weight: bold; 
            transition: 0.3s;
            display: flex; 
            align-items: center; 
            gap: 8px; 
            white-space: nowrap;
            font-size: 0.95em;
        }
        .generate-box button:hover { background: #357abd; }

        /* --- CONTAINER UTAMA --- */
        .container {
            flex: 1; width: 95%; max-width: 700px; text-align: center;
            background: rgba(255, 255, 255, 0.9); border-radius: 30px;
            padding: 30px 20px; margin: 15px 0 30px 0; box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
        }
        .menu-list { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin-top: 25px; }
        
        .menu-wrapper { 
            position: relative; flex: 1 1 100%;
            overflow: hidden; border-radius: 20px; transition: 0.3s;
            display: flex; align-items: stretch;
            box-shadow: 0 6px 15px rgba(0,0,0,0.08);
        }

        .copy-item-btn {
            width: 60px; 
            background: rgba(0, 0, 0, 0.12); 
            color: white; border: none;
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 20px; z-index: 20; transition: 0.3s;
        }
        .copy-item-btn:hover { background: rgba(0, 0, 0, 0.2); }

        .menu-item {
            flex: 1; display: flex; flex-direction: column; 
            align-items: center; justify-content: center;
            min-height: 90px; padding: 15px;
            text-decoration: none; color: white; font-weight: 600;
        }
        .menu-item span { font-size: 1em; margin-bottom: 4px; }

        .details-container { display: flex; align-items: center; justify-content: center; gap: 6px; }
        .price-text { font-size: 0.8em; font-weight: 400; background: rgba(0, 0, 0, 0.12); padding: 2px 10px; border-radius: 10px; }
        .status-badge { font-size: 0.75em; font-weight: 800; background: rgba(255,255,255,0.2); padding: 2px 10px; border-radius: 10px; text-transform: uppercase; border: 1px solid rgba(255,255,255,0.3); }

        .badge-new { 
            position: absolute; top: 8px; right: 8px; 
            background: #ff4757; color: white; font-size: 8px; 
            padding: 2px 7px; border-radius: 10px; font-weight: bold; z-index: 10; 
        }

        .admin-controls { position: absolute; bottom: 8px; right: 8px; display: flex; gap: 5px; z-index: 30; }
        .btn-ctrl {
            background: rgba(255,255,255,0.3); color: white; border: none;
            width: 28px; height: 28px; border-radius: 50%; cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 11px;
        }

        footer { width: 100%; padding: 20px; text-align: center; color: #777; margin-top: auto; font-size: 0.9em; }

        @media (min-width: 600px) {
            .menu-wrapper { flex: 1 1 calc(50% - 15px); }
        }
        @media (max-width: 400px) {
            .generate-box button span { display: none; } /* Hanya ikon di layar sangat kecil */
            .generate-box button::after { content: 'Acak'; } /* Ganti teks lebih pendek */
        }
    </style>
</head>
<body>

    <nav class="toolbar">
        <div class="nav-links">
            <a href="https://appnexa.github.io/" class="nav-item active"><i class="fa-solid fa-house"></i></a>
            <a href="https://appnexa.github.io/not.html" class="nav-item"><i class="fa-solid fa-note-sticky"></i></a>
            <a href="https://appnexa.github.io/copy.html" class="nav-item"><i class="fa-solid fa-copy"></i></a>
            <div class="nav-divider"></div>
        </div>
        <div class="auth-container" id="auth-wrapper">
            <button onclick="toggleLoginForm(event)" id="btn-login-ui" style="background:none; color:#555; border:1px solid #ddd; padding:8px 12px; border-radius:20px; cursor:pointer"><i class="fa-solid fa-user-lock"></i> Login</button>
            <div class="login-popup" id="login-popup">
                <input type="email" id="email" placeholder="Email Admin">
                <input type="password" id="password" placeholder="Password">
                <button class="btn-login-submit" onclick="login()">Masuk</button>
            </div>
            <button id="btn-logout" style="display:none; background: #ff4757; color:white; border:none; padding:8px 15px; border-radius:20px; cursor:pointer" onclick="logout()"><i class="fa-solid fa-power-off"></i> Logout</button>
        </div>
    </nav>

    <div id="admin-panel">
        <h3 style="margin-bottom:10px; color: #444;">Tambah Link Baru</h3>
        <input type="text" id="title" class="admin-input" placeholder="Nama Produk">
        <input type="text" id="url" class="admin-input" placeholder="URL Shopee">
        <input type="text" id="price" class="admin-input" placeholder="Harga" oninput="formatRupiah(this)">
        <select id="status" class="admin-select">
            <option value="">-- Tanpa Label --</option>
            <option value="STAR">Star</option>
            <option value="MALL">Mall</option>
        </select>
        <button class="btn-add" onclick="addMenu()">Terbitkan</button>
    </div>

    <div class="generate-container">
        <div class="generate-box">
            <input type="text" id="generatedNameOutput" placeholder="Klik Acak..." readonly>
            <button id="btn-generate" onclick="handleGenerate()">
                <i class="fa-solid fa-shuffle"></i> <span>Acak Nama</span>
            </button>
        </div>
    </div>

    <div class="container">
        <h2 style="color: #444; margin-bottom: 5px; font-weight: 800; letter-spacing: 1px;">LINK SHOPEE</h2>
        <div id="menu-container" class="menu-list"></div>
    </div>

    <footer>
        <p>&copy; 2026 Xurel - Muzans Developer</p>
    </footer>

    <script>
        // --- LOGIKA GENERATE NAMA ---
        let listFirstNames = [];
        let listLastNames = [];

        fetch('https://raw.githubusercontent.com/muzans/muzans.github.io/main/base.json')
            .then(res => res.json())
            .then(data => {
                listFirstNames = data.FirstNames || [];
                listLastNames = data.LastNames || data.FirstNames || [];
            });

        function handleGenerate() {
            if (listFirstNames.length === 0) return;
            const name = `${listFirstNames[Math.floor(Math.random() * listFirstNames.length)]} ${listLastNames[Math.floor(Math.random() * listLastNames.length)]}`;
            document.getElementById('generatedNameOutput').value = name;
            copyToClipboard(name, () => {
                const btn = document.getElementById('btn-generate');
                const oldContent = btn.innerHTML;
                btn.innerHTML = '<i class="fa-solid fa-check"></i> <span>Tersalin</span>';
                setTimeout(() => btn.innerHTML = oldContent, 1500);
            });
        }

        // --- FIREBASE ---
        const firebaseConfig = {
          apiKey: "AIzaSyDL_OnbYw8rElVqZvC5WqzBweWU5NTEJLA",
          authDomain: "proj-zea.firebaseapp.com",
          databaseURL: "https://proj-zea-default-rtdb.asia-southeast1.firebasedatabase.app",
          projectId: "proj-zea"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        let isAdmin = false;
        let editingKey = null;
        let menuDataCache = {};

        function toggleLoginForm(e) { e.stopPropagation(); const p = document.getElementById('login-popup'); p.style.display = (p.style.display==='flex')?'none':'flex'; }
        window.onclick = (e) => { if(!document.getElementById('auth-wrapper').contains(e.target)) document.getElementById('login-popup').style.display='none'; };
        
        function login() {
            auth.signInWithEmailAndPassword(document.getElementById('email').value, document.getElementById('password').value)
            .then(() => document.getElementById('login-popup').style.display='none')
            .catch(() => alert("Login Gagal"));
        }
        function logout() { auth.signOut(); }

        auth.onAuthStateChanged(user => {
            isAdmin = !!user;
            document.getElementById('admin-panel').style.display = isAdmin?'block':'none';
            document.getElementById('btn-logout').style.display = isAdmin?'block':'none';
            document.getElementById('btn-login-ui').style.display = isAdmin?'none':'block';
            renderMenus();
        });

        function addMenu() {
            const title = document.getElementById('title').value;
            const url = document.getElementById('url').value;
            if(title && url) {
                db.ref('linkshopee').push({
                    title, url, price: document.getElementById('price').value,
                    status: document.getElementById('status').value,
                    createdAt: firebase.database.ServerValue.TIMESTAMP
                }).then(() => {
                    document.getElementById('title').value = ''; document.getElementById('url').value = '';
                    document.getElementById('price').value = '';
                });
            }
        }

        db.ref('linkshopee').on('value', snap => {
            menuDataCache = snap.val() || {};
            renderMenus();
        });

        function renderMenus() {
            const container = document.getElementById('menu-container');
            container.innerHTML = "";
            const colors = ['#ff6b6b', '#54a0ff', '#5f27cd', '#ff9f43', '#1dd1a1', '#00d2d3', '#f368e0', '#48dbfb', '#ee5253', '#10ac84'];
            const keys = Object.keys(menuDataCache).reverse();

            keys.forEach((key, i) => {
                const data = menuDataCache[key];
                const isNew = Math.ceil(Math.abs(new Date() - (data.createdAt || Date.now())) / (1000 * 60 * 60 * 24)) <= 7;
                
                const wrapper = document.createElement('div');
                wrapper.className = 'menu-wrapper';
                wrapper.style.background = colors[i % colors.length];

                if (isAdmin && editingKey === key) {
                    wrapper.innerHTML = `<div class="edit-mode-container">...Mode Edit...</div>`;
                } else {
                    wrapper.innerHTML = `
                        ${isNew ? '<div class="badge-new">NEW</div>' : ''}
                        <button class="copy-item-btn" onclick="copyProductLink(event, '${data.url}', this)">
                            <i class="fa-solid fa-copy"></i>
                        </button>
                        <a href="${data.url}" target="_blank" class="menu-item">
                            <span>${data.title}</span>
                            <div class="details-container">
                                ${data.status ? `<span class="status-badge">${data.status}</span>` : ''}
                                ${data.price ? `<span class="price-text">${data.price}</span>` : ''}
                            </div>
                        </a>
                        ${isAdmin ? `
                        <div class="admin-controls">
                            <button class="btn-ctrl" onclick="startEdit('${key}')"><i class="fa-solid fa-pen"></i></button>
                            <button class="btn-ctrl" style="background:#e74c3c" onclick="deleteMenu('${key}')"><i class="fa-solid fa-trash"></i></button>
                        </div>` : ''}`;
                }
                container.appendChild(wrapper);
            });
        }

        function copyToClipboard(text, callback) {
            navigator.clipboard.writeText(text).then(() => { if(callback) callback(); });
        }

        function copyProductLink(e, url, btn) {
            e.preventDefault();
            copyToClipboard(url, () => {
                const oldIcon = btn.innerHTML;
                btn.innerHTML = '<i class="fa-solid fa-check"></i>';
                btn.style.background = '#2ecc71';
                setTimeout(() => { btn.innerHTML = oldIcon; btn.style.background = 'rgba(0,0,0,0.12)'; }, 1000);
            });
        }

        function formatRupiah(el) {
            let v = el.value.replace(/[^,\d]/g, '').toString();
            let split = v.split(','), sisa = split[0].length % 3, rup = split[0].substr(0, sisa), ribuan = split[0].substr(sisa).match(/\d{3}/gi);
            if (ribuan) { rup += (sisa ? '.' : '') + ribuan.join('.'); }
            el.value = rup ? 'Rp ' + rup : '';
        }

        function startEdit(k) { editingKey = k; renderMenus(); }
        function deleteMenu(k) { if(confirm("Hapus?")) db.ref('linkshopee/'+k).remove(); }
    </script>
</body>
</html>
