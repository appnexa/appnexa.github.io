<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xurel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        
        @keyframes gradientBackground {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body {
            min-height: 100vh;
            background: linear-gradient(120deg, #ff9a9e, #fad0c4, #fbc2eb, #a18cd1, #84fab0, #8fd3f4);
            background-size: 300% 300%;
            animation: gradientBackground 15s ease infinite;
            display: flex; flex-direction: column; align-items: center;
        }

        .toolbar {
            width: 100%; background: rgba(255, 255, 255, 0.95);
            padding: 8px 15px; display: flex; justify-content: space-between;
            align-items: center; box-shadow: 0 2px 15px rgba(0,0,0,0.1);
            position: sticky; top: 0; z-index: 1000;
        }

        .nav-links { display: flex; align-items: center; gap: 5px; }
        
        .nav-item {
            text-decoration: none; color: #555; 
            display: flex; align-items: center; justify-content: center;
            width: 40px; height: 40px;
            border-radius: 12px; transition: 0.3s;
        }
        
        .nav-item i { font-size: 1.2em; text-align: center; }

        .nav-item:hover, .nav-item.active { 
            color: #ff6b6b; 
            background: rgba(255, 107, 107, 0.1); 
        }

        .nav-divider {
            width: 1.5px; height: 22px; background: #e0e0e0; margin: 0 4px;
        }

        .auth-container { position: relative; }
        
        .login-popup {
            display: none; position: absolute; top: 50px; right: 0;
            background: white; padding: 15px; border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 240px; 
            flex-direction: column; gap: 10px; z-index: 1001;
        }
        
        .login-popup input { padding: 10px; border: 1px solid #ddd; border-radius: 8px; outline: none; }
        
        .remember-container {
            display: flex; align-items: center; gap: 8px;
            font-size: 0.85em; color: #666; cursor: pointer;
        }

        #admin-panel {
            background: white; padding: 25px; border-radius: 15px; margin: 20px 0;
            width: 90%; max-width: 600px; display: none; box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .admin-input, .admin-select { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #eee; border-radius: 8px; background: #f9f9f9; outline: none;}
        .btn-add { background: #2ecc71; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; transition: 0.3s; margin-top: 10px; }

        .generate-container {
            width: 95%; max-width: 700px;
            background: rgba(255, 255, 255, 0.9); border-radius: 25px;
            padding: 25px 30px; margin: 25px 0 5px 0; box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
        }
        .generate-box { 
            display: flex; gap: 15px; justify-content: center; align-items: stretch; width: 100%; 
        }
        .generate-box input {
            flex: 1; padding: 15px; border: 2px solid #ddd; border-radius: 15px;
            font-size: 1.05em; font-weight: bold; color: #444; text-align: center; outline: none; background: #f8f9fa;
        }
        .generate-box button {
            background: #54a0ff; color: white; border: none; padding: 15px 25px;
            border-radius: 15px; cursor: pointer; font-weight: bold; transition: 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 8px; white-space: nowrap; font-size: 1.05em;
        }
        .generate-box button:hover { background: #2e86de; transform: translateY(-2px); }

        .container {
            flex: 1; width: 95%; max-width: 700px; text-align: center;
            background: rgba(255, 255, 255, 0.9); border-radius: 25px;
            padding: 30px; margin: 20px 0 30px 0; box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
        }
        .menu-list { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin-top: 25px; }
        
        /* Layout Kartu Baru: Flexbox */
        .menu-wrapper { 
            position: relative; 
            flex: 1 1 calc(50% - 15px); 
            min-width: 140px; 
            overflow: hidden; 
            border-radius: 15px; 
            transition: 0.3s;
            display: flex; 
            align-items: stretch; /* Supaya tinggi copy button sama dengan link */
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .menu-item {
            flex: 1; /* Mengambil sisa ruang */
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            min-height: 90px; 
            padding: 15px 10px 15px 5px; 
            font-weight: 600;
            text-decoration: none; 
            color: white; 
            transition: 0.3s;
            font-size: 0.95em; 
            text-align: center;
            gap: 5px; 
        }
        .menu-item:hover { background: rgba(0,0,0,0.05); }

        .details-container { display: flex; align-items: center; justify-content: center; gap: 6px; }
        .price-text { font-size: 0.8em; font-weight: 400; background: rgba(0, 0, 0, 0.15); padding: 2px 8px; border-radius: 10px; }
        .status-badge { font-size: 0.8em; font-weight: 700; background: rgba(231, 76, 60, 0.9); color: white; padding: 2px 8px; border-radius: 10px; text-transform: uppercase; }

        .edit-mode-container {
            background: #fff; border-radius: 15px; padding: 12px; width: 100%;
            display: flex; flex-direction: column; gap: 8px; border: 2px solid #ff6b6b;
        }

        .admin-controls { position: absolute; bottom: 5px; right: 8px; display: flex; gap: 4px; z-index: 30; }
        .btn-ctrl {
            background: rgba(255,255,255,0.3); color: white; border: none;
            width: 24px; height: 24px; border-radius: 50%; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 10px;
        }

        /* --- COPY BUTTON SEUKURAN KARTU (DI KIRI) --- */
        .copy-item-btn {
            width: 55px; /* Lebar area tombol copy */
            background: rgba(0, 0, 0, 0.12); /* Background gelap transparan */
            color: white; 
            border: none;
            border-right: 1px solid rgba(255, 255, 255, 0.2);
            cursor: pointer;
            display: flex; 
            align-items: center; 
            justify-content: center;
            font-size: 20px; /* Ikon diperbesar */
            z-index: 20; 
            transition: 0.3s;
        }
        .copy-item-btn:hover { background: rgba(0, 0, 0, 0.25); }
        .copy-item-btn:active { transform: scale(0.95); }
        
        footer { width: 100%; padding: 20px; background: rgba(255,255,255,0.8); text-align: center; color: #666; margin-top: auto; }
        
        .badge-new { 
            position: absolute; 
            top: 5px; 
            right: 5px; 
            background: #ff4757; 
            color: white; 
            font-size: 8px; 
            padding: 2px 6px; 
            border-radius: 8px; 
            font-weight: bold; 
            z-index: 10; 
        }

        @media (max-width: 480px) { 
            .menu-wrapper { flex: 1 1 100%; }
        }
    </style>
</head>
<body>

    <nav class="toolbar">
        <div class="nav-links">
            <a href="https://appnexa.github.io/" class="nav-item active"><i class="fa-solid fa-house"></i></a>
            <a href="https://appnexa.github.io/not.html" class="nav-item"><i class="fa-solid fa-note-sticky"></i></a>
            <a href="https://appnexa.github.io/copy.html" class="nav-item"><i class="fa-solid fa-copy"></i></a>
            <div class="nav-divider"></div>
        </div>
        <div class="auth-container" id="auth-wrapper">
            <button onclick="toggleLoginForm(event)" id="btn-login-ui" style="background:none; color:#555; border:1px solid #ddd; padding:8px 12px; border-radius:20px; cursor:pointer"><i class="fa-solid fa-user-lock"></i> Login</button>
            <div class="login-popup" id="login-popup">
                <input type="email" id="email" placeholder="Email Admin">
                <input type="password" id="password" placeholder="Password">
                <button class="btn-add" onclick="login()">Masuk</button>
            </div>
            <button id="btn-logout" style="display:none; background: #ff4757; color:white; border:none; padding:8px 15px; border-radius:20px; cursor:pointer" onclick="logout()"><i class="fa-solid fa-power-off"></i> Logout</button>
        </div>
    </nav>

    <div id="admin-panel">
        <h3>Tambah Link Shopee</h3>
        <input type="text" id="title" class="admin-input" placeholder="Nama Produk">
        <input type="text" id="url" class="admin-input" placeholder="URL Link">
        <input type="text" id="price" class="admin-input" placeholder="Harga" oninput="formatRupiah(this)">
        <select id="status" class="admin-select">
            <option value="">-- Tanpa Label --</option>
            <option value="STAR">Star</option>
            <option value="MALL">Mall</option>
        </select>
        <button class="btn-add" onclick="addMenu()">Terbitkan</button>
    </div>

    <div class="generate-container">
        <div class="generate-box">
            <input type="text" id="generatedNameOutput" placeholder="---" readonly>
            <button id="btn-generate" onclick="handleGenerate()"><i class="fa-solid fa-shuffle"></i> Acak Nama</button>
        </div>
    </div>

    <div class="container">
        <h2 style="color: #444; margin-bottom: 5px;">LINK SHOPEE</h2>
        <div id="menu-container" class="menu-list"></div>
    </div>

    <footer>
        <p>&copy; 2026 Xurel - Muzans Developer • Link Shopee Edition</p>
    </footer>

    <script>
        // Logika Firebase & Nama Tetap Sama
        let listFirstNames = [];
        let listLastNames = [];
        fetch('https://raw.githubusercontent.com/muzans/muzans.github.io/main/base.json')
            .then(res => res.json())
            .then(data => { listFirstNames = data.FirstNames; listLastNames = data.LastNames; });

        function handleGenerate() {
            const fullName = `${listFirstNames[Math.floor(Math.random() * listFirstNames.length)]} ${listLastNames[Math.floor(Math.random() * listLastNames.length)]}`;
            document.getElementById('generatedNameOutput').value = fullName;
            copyToClipboard(fullName);
        }

        function copyToClipboard(text, callback) {
            navigator.clipboard.writeText(text).then(() => { if(callback) callback(); });
        }

        function copyProductLink(event, url, btn) {
            event.preventDefault();
            copyToClipboard(url, () => {
                const original = btn.innerHTML;
                btn.innerHTML = '<i class="fa-solid fa-check"></i>';
                btn.style.background = '#2ecc71';
                setTimeout(() => { 
                    btn.innerHTML = original; 
                    btn.style.background = 'rgba(0,0,0,0.12)'; 
                }, 1000);
            });
        }

        // Firebase Setup
        const firebaseConfig = {
          apiKey: "AIzaSyDL_OnbYw8rElVqZvC5WqzBweWU5NTEJLA",
          authDomain: "proj-zea.firebaseapp.com",
          databaseURL: "https://proj-zea-default-rtdb.asia-southeast1.firebasedatabase.app",
          projectId: "proj-zea"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();
        let isAdmin = false;
        let editingKey = null;

        auth.onAuthStateChanged(user => {
            isAdmin = !!user;
            document.getElementById('admin-panel').style.display = isAdmin ? 'block' : 'none';
            document.getElementById('btn-logout').style.display = isAdmin ? 'block' : 'none';
            document.getElementById('btn-login-ui').style.display = isAdmin ? 'none' : 'block';
            renderMenus();
        });

        db.ref('linkshopee').on('value', (snap) => {
            menuDataCache = snap.val() || {};
            renderMenus();
        });

        function renderMenus() {
            const container = document.getElementById('menu-container');
            container.innerHTML = "";
            const colors = ['#ff6b6b', '#54a0ff', '#5f27cd', '#ff9f43', '#1dd1a1', '#00d2d3', '#f368e0', '#48dbfb', '#ee5253', '#10ac84'];
            const keys = Object.keys(menuDataCache).reverse();

            keys.forEach((key, index) => {
                const data = menuDataCache[key];
                const isNew = Math.ceil(Math.abs(new Date() - (data.createdAt || Date.now())) / (1000 * 60 * 60 * 24)) <= 7;
                const wrapper = document.createElement('div');
                wrapper.className = 'menu-wrapper';
                wrapper.style.background = colors[index % colors.length];

                if (isAdmin && editingKey === key) {
                    wrapper.innerHTML = `<div class="edit-mode-container">...Edit Mode...</div>`; // Disederhanakan untuk contoh
                } else {
                    wrapper.innerHTML = `
                        ${isNew ? '<div class="badge-new">NEW</div>' : ''}
                        
                        <button class="copy-item-btn" onclick="copyProductLink(event, '${data.url}', this)">
                            <i class="fa-solid fa-copy"></i>
                        </button>

                        <a href="${data.url}" target="_blank" class="menu-item">
                            <span>${data.title}</span>
                            <div class="details-container">
                                ${data.status ? `<span class="status-badge">${data.status}</span>` : ''}
                                ${data.price ? `<span class="price-text">${data.price}</span>` : ''}
                            </div>
                        </a>
                        ${isAdmin ? `
                        <div class="admin-controls">
                            <button class="btn-ctrl" onclick="startEdit('${key}')"><i class="fa-solid fa-pen"></i></button>
                            <button class="btn-ctrl" style="background:#e74c3c" onclick="deleteMenu('${key}')"><i class="fa-solid fa-trash"></i></button>
                        </div>` : ''}`;
                }
                container.appendChild(wrapper);
            });
        }

        // Fungsi Admin Tambahan (formatRupiah, login, dll tetap sama)
        function formatRupiah(el) { /* tetap sama */ }
        function login() { /* tetap sama */ }
        function logout() { auth.signOut(); }
        function addMenu() {
            const title = document.getElementById('title').value;
            const url = document.getElementById('url').value;
            if(title && url) {
                db.ref('linkshopee').push({
                    title: title, url: url, price: document.getElementById('price').value,
                    status: document.getElementById('status').value,
                    createdAt: firebase.database.ServerValue.TIMESTAMP
                });
            }
        }
    </script>
</body>
</html>
